<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 资讯详情</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card-bg: #13131c;
    --card-border: #1e1e2e;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --accent: #8b5cf6;
    --accent2: #06b6d4;
  }
  * { margin:0; padding:0; box-sizing:border-box }
  body { font-family:'Inter','PingFang SC','Microsoft YaHei',sans-serif;
         background:var(--bg); color:var(--text);
         min-height:100vh; line-height:1.7 }
  a { color:inherit; text-decoration:none }

  header {
    background:linear-gradient(135deg,#0f0f1a 0%,#1a1035 100%);
    border-bottom:1px solid #2a2a4a;
    padding:1.5rem 2rem;
    position:sticky;top:0;z-index:100;
  }
  .back-btn {
    display:inline-flex;align-items:center;gap:.5rem;
    color:var(--text-dim);font-size:.85rem;
    transition:color .2s;
  }
  .back-btn:hover { color:var(--accent) }

  main { max-width:720px;margin:0 auto;padding:2.5rem 1.5rem }

  .article-meta {
    display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;
    margin-bottom:1.5rem;
  }
  .source-tag,.cat-tag {
    font-size:.75rem;padding:.25rem .75rem;border-radius:.375rem;font-weight:600;
  }
  .pub-date { font-size:.8rem;color:var(--text-dim);margin-left:auto }

  h1 {
    font-size:1.75rem;font-weight:800;line-height:1.3;
    margin-bottom:1.5rem;
    background:linear-gradient(135deg,#e2e8f0,#c4b5fd);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
  }

  .summary-card {
    background:var(--card-bg);border:1px solid var(--card-border);
    border-radius:1rem;padding:2rem;margin:1.5rem 0;
    position:relative;overflow:hidden;
  }
  .summary-card::before {
    content:'';
    position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
  .summary-label {
    display:flex;align-items:center;gap:.5rem;
    font-size:.7rem;color:var(--accent);font-weight:700;
    letter-spacing:.1em;text-transform:uppercase;margin-bottom:1rem;
  }
  .summary-label::before {
    content:'🤖';font-size:.9rem;
  }
  .summary-content {
    font-size:1rem;line-height:1.8;color:var(--text);
    white-space:pre-wrap;
  }

  .original-section {
    background:#0d0d18;border:1px solid #1e1e2e;
    border-radius:.875rem;padding:1.5rem;margin-top:2rem;
  }
  .original-label {
    font-size:.75rem;color:var(--text-dim);margin-bottom:.75rem;
    display:flex;align-items:center;gap:.5rem;
  }
  .original-title {
    font-size:.95rem;font-weight:600;margin-bottom:1rem;
    color:var(--text);
  }
  .original-title:hover { color:var(--accent) }
  .original-link {
    display:inline-flex;align-items:center;gap:.5rem;
    background:var(--accent);color:#fff;
    padding:.65rem 1.5rem;border-radius:.5rem;font-size:.9rem;font-weight:600;
    transition:opacity .2s,transform .2s;
  }
  .original-link:hover { opacity:.85;transform:translateY(-1px) }

  .loading {
    text-align:center;padding:4rem;color:var(--text-dim);
  }
  .error-box {
    background:#1a0f0f;border:1px solid #ef444440;
    border-radius:.875rem;padding:1.5rem;color:#ef4444;
    margin-top:2rem;
  }
</style>
</head>
<body>

<header>
  <a class="back-btn" href="javascript:history.back()">
    ← 返回日报列表
  </a>
</header>

<main id="content">
  <div class="loading">⏳ 加载中...</div>
</main>

<script>
// 从 URL 获取文章索引和日期
function getArticleIndex() {
  const params = new URLSearchParams(window.location.search);
  const idx = parseInt(params.get('id'), 10);
  return isNaN(idx) ? 0 : idx;
}

function getArticleDate() {
  const params = new URLSearchParams(window.location.search);
  const dateParam = params.get('date');
  if (dateParam) return dateParam;
  // 尝试从 localStorage 获取当前页日期
  const storedDate = localStorage.getItem('ai-daily-articles-date');
  if (storedDate) return storedDate;
  // 回退：计算今天的日期
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

// 恢复文章数据
function restoreArticle() {
  const idx = getArticleIndex();
  const dateStr = getArticleDate();

  // 从 localStorage 读取指定日期的文章数据
  let article = null;
  try {
    const storageKey = 'ai-daily-articles-' + dateStr;
    const stored = localStorage.getItem(storageKey) || localStorage.getItem('ai-daily-articles');
    if (stored) {
      const articles = JSON.parse(stored);
      article = articles[idx];
    }
  } catch(e) {}

  const container = document.getElementById('content');

  if (!article) {
    container.innerHTML = `
      <div class="error-box">
        <strong>⚠ 无法加载文章详情</strong><br>
        可能的原因：<br>
        · 文章数据未找到（索引 ${idx}）<br>
        · 从其他日期的历史页面跳转<br><br>
        <a href="index.html" style="color:var(--accent);">← 返回日报首页</a>
      </div>`;
    return;
  }

  // 解码 HTML 实体
  const decodeEntities = (str) => {
    return (str||'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
                     .replace(/&#39;/g,"'").replace(/&quot;/g,'"').replace(/&#8217;/g,"'")
                     .replace(/&#8216;/g,"'").replace(/&#160;/g,' ');
  };

  const title = decodeEntities(article.title||'');
  const summary = decodeEntities(article.chinese_summary||article.summary||'暂无摘要');
  const source = article.source||'';
  const category = article.category||'';
  const pubDate = (article.published||'').substring(0,10);
  const url = article.url||'';

  const colorMap = {
    "研究突破":"#f59e0b","行业动态":"#10b981","融资并购":"#ef4444",
    "产品发布":"#3b82f6","政策监管":"#f97316","活动会议":"#ec4899"
  };
  const color = colorMap[category]||'#8b5cf6';

  const iconMap = {
    "研究突破":"🔬","行业动态":"📊","融资并购":"💰",
    "产品发布":"🛠","政策监管":"📋","活动会议":"🎪"
  };
  const icon = iconMap[category]||'📌';

  // 更新返回链接
  const backBtn = document.querySelector('.back-btn');
  if (backBtn) {
    backBtn.href = `index.html${dateStr !== 'today' ? '?date=' + dateStr : ''}`;
    // 点击返回时触发日报页加载历史
    backBtn.addEventListener('click', (e) => {
      if (dateStr !== 'today') {
        sessionStorage.setItem('load-history-date', dateStr);
      }
    });
  }

  document.title = `${title} - AI 日报详情`;

  container.innerHTML = `
    <div class="article-meta">
      <span class="source-tag" style="background:${color}20;color:${color}">${source}</span>
      <span class="cat-tag" style="background:${color}30;color:${color}">${icon} ${category}</span>
      <span class="pub-date">📅 ${pubDate}</span>
    </div>

    <h1>${title}</h1>

    <div class="summary-card">
      <div class="summary-label">AI 中文摘要</div>
      <div class="summary-content">${summary}</div>
    </div>

    <div class="original-section">
      <div class="original-label">📖 原文链接</div>
      <a class="original-title" href="${url}" target="_blank" rel="noopener">${title}</a>
      <br><br>
      <a class="original-link" href="${url}" target="_blank" rel="noopener">
        🔗 阅读完整原文 →
      </a>
    </div>
  `;
}

restoreArticle();
</script>

</body>
</html>
