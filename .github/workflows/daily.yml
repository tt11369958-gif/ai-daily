name: AI Daily Auto Run

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install requests feedparser openai Pillow
      - name: Create config.json
        run: |
          python << 'PYEOF'
          import json
          c = {
            "llm": {
              "api_key": "${{ secrets.DEEPSEEK_API_KEY }}",
              "api_base": "${{ secrets.DEEPSEEK_API_BASE }}",
              "model": "deepseek-chat"
            },
            "github": {
              "user": "${{ secrets.GH_USER }}",
              "repo": "ai-daily",
              "token": "${{ secrets.GITHUB_TOKEN }}"
            },
            "wecom": {
              "webhook": "${{ secrets.WECOM_WEBHOOK }}"
            }
          }
          with open("config.json","w",encoding="utf-8") as f:
              json.dump(c, f, ensure_ascii=False, indent=2)
          PYEOF
      - name: Run AI Daily
        run: python scripts/run.py