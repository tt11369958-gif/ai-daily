name: AI Daily Auto Run

on:
  schedule:
    # 北京时间 08:30 = UTC 00:30
    - cron: '30 0 * * *'
  workflow_dispatch:   # 支持手动触发

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser openai Pillow

      - name: Run AI Daily (generate output)
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_BASE: ${{ secrets.DEEPSEEK_API_BASE }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USER: ${{ secrets.GH_USER }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
        run: python scripts/run.py
      - name: Copy detail.html
        run: cp detail.html output/detail.html
      - name: Fetch history files
        run: |
          git fetch origin gh-pages:gh-pages --depth=1
          mkdir -p output/history
          git show gh-pages:history_index.json > output/history_index.json 2>/dev/null || true
          for f in $(git ls-tree -r --name-only gh-pages history/ 2>/dev/null); do
            mkdir -p "$(dirname output/$f)"
            git show "gh-pages:$f" > "output/$f"
          done
          echo "=== output/history ==="
          ls -la output/history/
      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'output/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send WeChat notification
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          GH_USER: ${{ secrets.GH_USER }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ai-daily
          GITHUB_PAGES_URL: ${{ steps.deployment.outputs.page_url }}
        run: python scripts/notify_only.py
