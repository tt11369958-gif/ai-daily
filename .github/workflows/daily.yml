name: AI Daily Auto Run

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests feedparser openai Pillow

      - name: Create config.json
        run: |
          python << 'PYEOF'
          import json, os
          config = {
            "llm": {
              "api_key": os.environ.get("DEEPSEEK_API_KEY", ""),
              "api_base": os.environ.get("DEEPSEEK_API_BASE", "https://api.deepseek.com"),
              "model": "deepseek-chat"
            },
            "github": {
              "user": os.environ.get("GH_USER", ""),
              "repo": "ai-daily",
              "token": os.environ.get("GH_TOKEN", "")
            },
            "wecom": {
              "webhook": os.environ.get("WECOM_WEBHOOK", "")
            }
          }
          with open("config.json", "w", encoding="utf-8") as f:
            json.dump(config, f, ensure_ascii=False, indent=2)
          PYEOF

      - name: Run AI Daily
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_BASE: ${{ secrets.DEEPSEEK_API_BASE }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USER: ${{ secrets.GH_USER }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
        run: python scripts/run.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'output/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send WeChat notification
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          GH_USER: ${{ secrets.GH_USER }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_PAGES_URL: ${{ steps.deployment.outputs.page_url }}
        run: python scripts/notify_only.py
