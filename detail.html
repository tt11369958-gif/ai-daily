<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 日报 · 文章详情</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card-bg: #13131c;
    --card-border: #1e1e2e;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --accent: #8b5cf6;
    --accent2: #06b6d4;
  }
  * { margin:0; padding:0; box-sizing:border-box }
  body {
    font-family:'Inter','PingFang SC','Microsoft YaHei',sans-serif;
    background:var(--bg); color:var(--text);
    min-height:100vh; line-height:1.6;
  }
  a { color:inherit; text-decoration:none }

  /* ── 顶部导航条 ── */
  .top-bar {
    background:linear-gradient(135deg,#0f0f1a 0%,#1a1035 100%);
    border-bottom:1px solid #2a2a4a;
    padding:.85rem 1.5rem;
    display:flex;align-items:center;gap:.75rem;
    position:sticky;top:0;z-index:100;
  }
  .back-btn {
    display:inline-flex;align-items:center;gap:.4rem;
    background:#1a1a2e;border:1px solid #2a2a4a;color:var(--text-dim);
    padding:.4rem .9rem;border-radius:.5rem;cursor:pointer;
    font-size:.82rem;transition:all .2s;
  }
  .back-btn:hover { border-color:var(--accent);color:var(--accent) }
  .top-bar-title {
    font-size:.9rem;font-weight:700;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;
  }

  /* ── 主内容区 ── */
  .detail-page {
    max-width:720px;margin:0 auto;
    padding:2rem 1.5rem 4rem;
  }

  /* ── 文章卡片头部 ── */
  .detail-card {
    background:var(--card-bg);border:1px solid var(--card-border);
    border-radius:1.25rem;overflow:hidden;
    animation:fadeIn .4s ease;
  }
  @keyframes fadeIn {
    from{opacity:0;transform:translateY(16px)}
    to{opacity:1;transform:translateY(0)}
  }

  .detail-header {
    padding:1.75rem 1.75rem 1.25rem;
    background:linear-gradient(135deg,#0f0f1a 0%,#1a1035 100%);
    border-bottom:1px solid #1e1e2e;
  }
  .detail-rank {
    display:inline-block;font-size:.7rem;font-weight:800;
    background:linear-gradient(135deg,#8b5cf6,#06b6d4);
    color:#fff;padding:.2rem .65rem;border-radius:2rem;
    margin-bottom:.85rem;letter-spacing:.04em;
  }
  .detail-meta {
    display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.85rem;
  }
  .detail-meta span {
    font-size:.72rem;padding:.2rem .55rem;border-radius:.3rem;font-weight:600;
  }
  .detail-title {
    font-size:1.25rem;font-weight:800;line-height:1.45;
    margin-bottom:.5rem;color:var(--text);
  }
  .detail-source {
    font-size:.75rem;color:#555;
    word-break:break-all;
  }
  .detail-source a { color:#444;text-decoration:underline }
  .detail-source a:hover { color:var(--accent) }

  /* ── 内容区 ── */
  .detail-body {
    padding:1.5rem 1.75rem;
  }
  .section-label {
    font-size:.68rem;font-weight:700;color:var(--accent);
    letter-spacing:.08em;text-transform:uppercase;
    margin-bottom:.65rem;margin-top:1.5rem;
    display:flex;align-items:center;gap:.4rem;
  }
  .section-label:first-child { margin-top:0 }
  .summary-box {
    font-size:.9rem;line-height:1.85;color:var(--text);
    background:#0d0d18;border:1px solid #1e1e2e;
    border-radius:.75rem;padding:1.1rem 1.25rem;
  }
  .original-box {
    font-size:.83rem;line-height:1.75;color:var(--text-dim);
    background:#0d0d18;border:1px solid #1e1e2e;
    border-radius:.75rem;padding:1rem 1.25rem;
  }

  /* ── 底部操作栏 ── */
  .detail-actions {
    padding:1.25rem 1.75rem 1.5rem;
    border-top:1px solid #1e1e2e;
    display:flex;gap:.75rem;
  }
  .btn-primary {
    flex:1;background:var(--accent);color:#fff;
    text-align:center;padding:.75rem;border-radius:.6rem;
    font-size:.88rem;font-weight:700;cursor:pointer;
    transition:opacity .2s;border:none;display:block;
  }
  .btn-primary:hover { opacity:.85 }
  .btn-secondary {
    background:#1a1a2e;border:1px solid #2a2a4a;color:var(--text-dim);
    padding:.75rem 1.25rem;border-radius:.6rem;
    font-size:.88rem;cursor:pointer;transition:all .2s;
    white-space:nowrap;
  }
  .btn-secondary:hover { border-color:var(--accent);color:var(--accent) }

  /* ── 错误状态 ── */
  .error-state {
    text-align:center;padding:4rem 2rem;
    color:var(--text-dim);
  }
  .error-state h2 { font-size:1.2rem;margin-bottom:.75rem;color:#ef4444 }
  .error-state p { font-size:.9rem;margin-bottom:1.5rem }
  .error-state a {
    display:inline-block;background:var(--accent);color:#fff;
    padding:.65rem 1.5rem;border-radius:.6rem;font-size:.88rem;font-weight:700;
    transition:opacity .2s;
  }
  .error-state a:hover { opacity:.85 }
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="top-bar">
  <button class="back-btn" onclick="goBack()">← 返回日报</button>
  <span class="top-bar-title">🤖 AI 日报详情</span>
</div>

<!-- 主内容 -->
<main class="detail-page" id="detailPage">
  <!-- JS 动态填充 -->
</main>

<script>
const CAT_COLORS = {
  "研究突破":"#f59e0b","行业动态":"#10b981","融资并购":"#ef4444",
  "产品发布":"#3b82f6","政策监管":"#f97316","活动会议":"#ec4899"
};
const CAT_ICONS = {
  "研究突破":"🔬","行业动态":"📊","融资并购":"💰",
  "产品发布":"🛠","政策监管":"📋","活动会议":"🎪"
};
const WEEKDAYS = ["周日","周一","周二","周三","周四","周五","周六"];

function goBack() {
  if (document.referrer && document.referrer !== window.location.href) {
    history.back();
  } else {
    window.location.href = 'index.html';
  }
}

function render(a, idx) {
  const color = CAT_COLORS[a.category] || '#8b5cf6';
  const icon = CAT_ICONS[a.category] || '📌';
  const pubDate = (a.published || '').substring(0, 10);
  const weekday = pubDate ? WEEKDAYS[new Date(pubDate).getDay()] : '';
  const rank = idx + 1;

  document.title = `AI 日报 · ${a.title || '文章详情'}`;

  const page = document.getElementById('detailPage');
  page.innerHTML = `
    <div class="detail-card">
      <div class="detail-header">
        <span class="detail-rank">#${rank} · ${icon} ${a.category || '未分类'}</span>
        <div class="detail-meta">
          <span style="background:${color}20;color:${color}">${icon} ${a.source || ''}</span>
          <span style="background:${color}30;color:${color}">${a.category || ''}</span>
          ${weekday ? `<span style="color:#666">${weekday} ${pubDate}</span>` : ''}
        </div>
        <h1 class="detail-title">${escHtml(a.title || '')}</h1>
        <p class="detail-source">
          来源：${escHtml(a.source || '')}
          ${a.url ? ` &nbsp;|&nbsp; <a href="${escHtml(a.url)}" target="_blank" rel="noopener">${escHtml(a.url.length > 60 ? a.url.substring(0,60)+'…' : a.url)}</a>` : ''}
        </p>
      </div>

      <div class="detail-body">
        <p class="section-label">🤖 AI 中文总结</p>
        <div class="summary-box">${escHtml(a.chinese_summary || a.summary || '（暂无 AI 总结）')}</div>

        ${(a.summary && a.summary !== a.chinese_summary) ? `
        <p class="section-label">📄 原文摘要</p>
        <div class="original-box">${escHtml(a.summary.substring(0, 600))}${a.summary.length > 600 ? '…' : ''}</div>
        ` : ''}
      </div>

      <div class="detail-actions">
        <button class="btn-secondary" onclick="goBack()">← 返回列表</button>
        ${a.url ? `<a class="btn-primary" href="${escHtml(a.url)}" target="_blank" rel="noopener">▶ 阅读原文</a>` : ''}
      </div>
    </div>
  `;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function showError(msg) {
  document.getElementById('detailPage').innerHTML = `
    <div class="error-state">
      <h2>⚠️ 加载失败</h2>
      <p>${msg}</p>
      <a href="index.html">← 返回首页</a>
    </div>
  `;
}

// ── 初始化：从 sessionStorage 读取数据 ──
(function init() {
  const params = new URLSearchParams(window.location.search);
  const idx = parseInt(params.get('idx') || '0', 10);

  let articles = null;
  try {
    const raw = sessionStorage.getItem('ai_articles');
    if (raw) articles = JSON.parse(raw);
  } catch(e) {}

  if (!articles || !articles.length) {
    showError('未找到文章数据。请从日报列表点击文章进入详情。');
    return;
  }

  const a = articles[idx];
  if (!a) {
    showError(`文章索引 #${idx} 不存在（共 ${articles.length} 篇）。`);
    return;
  }

  render(a, idx);
})();
</script>
</body>
</html>
